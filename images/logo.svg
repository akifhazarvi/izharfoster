<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" role="img" aria-label="Izhar Foster — Cold-Chain Division of Izhar Engineering">
  <defs>
    <!-- Plaque body: glacier ink with subtle vertical depth -->
    <linearGradient id="plaqueBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#11264A"/>
      <stop offset="100%" stop-color="#08172E"/>
    </linearGradient>

    <!-- Cream inner frame: paper tone with warm depth at the edges -->
    <linearGradient id="creamFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5F2EC"/>
      <stop offset="50%"  stop-color="#ECE7DC"/>
      <stop offset="100%" stop-color="#DCD4C0"/>
    </linearGradient>

    <!-- GREEN compressor body — emerald industrial tone matching the reference logo -->
    <linearGradient id="greenBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3FA85F"/>
      <stop offset="55%"  stop-color="#2E8A4A"/>
      <stop offset="100%" stop-color="#1F6B36"/>
    </linearGradient>
    <linearGradient id="greenHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5BC079"/>
      <stop offset="100%" stop-color="#2E8A4A"/>
    </linearGradient>

    <style>
      .wm-text {
        fill: #F5F2EC;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 50px;
        letter-spacing: 0.5px;
      }
      .tag-mono {
        fill: #6E6F73;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 8.5px;
        letter-spacing: 3.2px;
        text-transform: uppercase;
      }
      .tag-rule { stroke: #E36A1E; stroke-width: 1.5; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ==== PLAQUE: notched street-sign silhouette ==== -->

  <!-- Outer cream plaque frame -->
  <path d="M 18 14
           L 18 22
           L 10 22
           L 10 38
           L 4 38
           L 4 70
           L 10 70
           L 10 86
           L 18 86
           L 18 94
           L 442 94
           L 442 86
           L 450 86
           L 450 70
           L 456 70
           L 456 38
           L 450 38
           L 450 22
           L 442 22
           L 442 14
           Z"
        fill="url(#creamFrame)"
        stroke="#0A1F3D"
        stroke-width="1.2"
        stroke-linejoin="round"/>

  <!-- Inner ink plaque -->
  <path d="M 23 19
           L 23 25
           L 15 25
           L 15 41
           L 9 41
           L 9 67
           L 15 67
           L 15 83
           L 23 83
           L 23 89
           L 437 89
           L 437 83
           L 445 83
           L 445 67
           L 451 67
           L 451 41
           L 445 41
           L 445 25
           L 437 25
           L 437 19
           Z"
        fill="url(#plaqueBody)"
        stroke="#F5F2EC"
        stroke-width="0.8"
        stroke-opacity="0.25"/>

  <!-- Faint inner hairline -->
  <path d="M 27 23
           L 27 27
           L 19 27
           L 19 43
           L 13 43
           L 13 65
           L 19 65
           L 19 81
           L 27 81
           L 27 85
           L 433 85
           L 433 81
           L 441 81
           L 441 65
           L 447 65
           L 447 43
           L 441 43
           L 441 27
           L 433 27
           L 433 23
           Z"
        fill="none"
        stroke="#F5F2EC"
        stroke-width="0.5"
        stroke-opacity="0.18"/>

  <!-- ==== WORDMARK ==== Render as one text element so kerning is perfect.
       The "O" is then covered by the medallion overlay. -->
  <text x="40" y="70" class="wm-text">IZHARFOSTER</text>

  <!-- ==== GREEN COMPRESSOR MEDALLION (the "O" of FOSTER) ====
       Centered at the natural O glyph position (x≈243) so spacing reads
       correctly on every viewport. The medallion's cream ring fully covers
       the O underneath. Detailed twin-cylinder reciprocating compressor. -->
  <g transform="translate(243, 54)">
    <!-- Outer cream ring -->
    <circle cx="0" cy="0" r="25" fill="#F5F2EC" stroke="#0A1F3D" stroke-width="1"/>
    <!-- Inner cream backdrop (so the green machine has a clean field) -->
    <circle cx="0" cy="0" r="22" fill="#F5F2EC"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0A1F3D" stroke-width="0.5" stroke-opacity="0.25"/>

    <!-- ==== GREEN COMPRESSOR ASSEMBLY ==== -->
    <g stroke="#0A1F3D" stroke-linejoin="round" stroke-linecap="round">

      <!-- Mounting baseplate / skid -->
      <rect x="-17" y="11" width="34" height="3" rx="0.5"
            fill="url(#greenBody)" stroke-width="0.6"/>
      <!-- Anti-vibration feet -->
      <rect x="-15" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="-1.25" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="12.5" y="14" width="2.5" height="2" fill="#0A1F3D"/>

      <!-- Crankcase body -->
      <path d="M -16 11
               L -16 3
               Q -16 1 -14 1
               L 14 1
               Q 16 1 16 3
               L 16 11 Z"
            fill="url(#greenBody)" stroke-width="0.7"/>
      <!-- Crankcase bolt-line -->
      <line x1="-14" y1="6.5" x2="14" y2="6.5" stroke-width="0.4" opacity="0.45"/>
      <!-- Bolt heads on crankcase -->
      <circle cx="-12" cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="-6"  cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="0"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="6"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="12"  cy="9" r="0.6" fill="#0A1F3D"/>

      <!-- LEFT cylinder -->
      <rect x="-12" y="-9" width="9" height="10" rx="1.2"
            fill="url(#greenHead)" stroke-width="0.7"/>
      <!-- Cooling fins -->
      <g stroke-width="0.35" opacity="0.65">
        <line x1="-12" y1="-7"  x2="-3" y2="-7"/>
        <line x1="-12" y1="-5"  x2="-3" y2="-5"/>
        <line x1="-12" y1="-3"  x2="-3" y2="-3"/>
        <line x1="-12" y1="-1"  x2="-3" y2="-1"/>
      </g>
      <!-- Top cap (head) -->
      <rect x="-13" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#greenHead)" stroke-width="0.6"/>
      <circle cx="-11" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="-3.5" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- RIGHT cylinder -->
      <rect x="3" y="-9" width="9" height="10" rx="1.2"
            fill="url(#greenHead)" stroke-width="0.7"/>
      <g stroke-width="0.35" opacity="0.65">
        <line x1="3"  y1="-7" x2="12" y2="-7"/>
        <line x1="3"  y1="-5" x2="12" y2="-5"/>
        <line x1="3"  y1="-3" x2="12" y2="-3"/>
        <line x1="3"  y1="-1" x2="12" y2="-1"/>
      </g>
      <rect x="2" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#greenHead)" stroke-width="0.6"/>
      <circle cx="4" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="11" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- ==== REFRIGERANT MANIFOLD + VALVES ==== -->
      <rect x="-14" y="-13.5" width="27" height="2" rx="0.8"
            fill="url(#greenHead)" stroke-width="0.5"/>
      <!-- Suction valve (left) -->
      <circle cx="-9" cy="-15" r="1.4" fill="url(#greenHead)" stroke-width="0.5"/>
      <line x1="-9" y1="-16.5" x2="-9" y2="-13.5" stroke-width="0.4"/>
      <!-- Discharge valve (right) -->
      <circle cx="8" cy="-15" r="1.4" fill="url(#greenHead)" stroke-width="0.5"/>
      <line x1="8" y1="-16.5" x2="8" y2="-13.5" stroke-width="0.4"/>

      <!-- Pressure gauge -->
      <circle cx="-0.5" cy="-15.5" r="1.6" fill="#F5F2EC" stroke-width="0.5"/>
      <line x1="-0.5" y1="-15.5" x2="0.5" y2="-16.3" stroke-width="0.4"/>

      <!-- Suction/discharge piping curling out either side -->
      <path d="M -14 -12.5
               Q -18 -10 -18 -6
               Q -18 -2 -16 0"
            fill="none" stroke-width="1"/>
      <path d="M 13 -12.5
               Q 17 -10 17 -6
               Q 17 -2 15 0"
            fill="none" stroke-width="1"/>
    </g>
  </g>

  <!-- ==== TAGLINE BELOW PLAQUE ==== -->
  <g transform="translate(40, 116)">
    <line x1="0" y1="-3.5" x2="14" y2="-3.5" class="tag-rule"/>
    <text x="22" y="0" class="tag-mono">Division of Izhar Engineering · Since 1959</text>
  </g>
</svg>
