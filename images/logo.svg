<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 130" role="img" aria-label="Izhar Foster — Cold-Chain Division of Izhar Engineering">
  <defs>
    <!-- ==== SANDWICH-PANEL CROSS-SECTION LAYERS ====
         Three nested layers, like an actual PIR panel cut on the diagonal:
         outer steel skin (blue) → foam core (cream, textured) →
         inner steel skin (cream/paper) where the wordmark sits. -->

    <!-- Outer + inner blue steel skin: glacier ink with vertical depth -->
    <linearGradient id="steelSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#11264A"/>
      <stop offset="100%" stop-color="#08172E"/>
    </linearGradient>

    <!-- Cream PIR foam core: warm paper tone with subtle vertical shading -->
    <linearGradient id="foamCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5F2EC"/>
      <stop offset="50%"  stop-color="#ECE7DC"/>
      <stop offset="100%" stop-color="#DCD4C0"/>
    </linearGradient>

    <!-- Granular foam texture — small dots to suggest closed-cell PIR -->
    <pattern id="foamTexture" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="url(#foamCore)"/>
      <circle cx="1.2" cy="1.2" r="0.45" fill="#C8BFA6" opacity="0.55"/>
      <circle cx="4.3" cy="2.5" r="0.32" fill="#D5CDB8" opacity="0.45"/>
      <circle cx="2.8" cy="4.6" r="0.40" fill="#B8AE94" opacity="0.40"/>
      <circle cx="5.1" cy="5.3" r="0.28" fill="#D5CDB8" opacity="0.50"/>
    </pattern>

    <!-- GREEN compressor body — emerald industrial tone matching the reference logo -->
    <linearGradient id="greenBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3FA85F"/>
      <stop offset="55%"  stop-color="#2E8A4A"/>
      <stop offset="100%" stop-color="#1F6B36"/>
    </linearGradient>
    <linearGradient id="greenHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5BC079"/>
      <stop offset="100%" stop-color="#2E8A4A"/>
    </linearGradient>

    <style>
      .wm-text {
        fill: #F5F2EC;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 50px;
        letter-spacing: 0.5px;
      }
      .tag-mono {
        fill: #6E6F73;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 8.5px;
        letter-spacing: 3.2px;
        text-transform: uppercase;
      }
      .tag-rule { stroke: #E36A1E; stroke-width: 1.5; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ==== PLAQUE: sandwich-panel CROSS-SECTION ====
       Three nested layers visible at the cut edge — exactly like a real
       PIR panel: blue steel skin → cream foam core → blue steel skin.
       Each end has stepped tongue tabs (panel tongue-and-groove profile).

       Layer 1 (outermost): blue steel skin, full silhouette with deep
       panel-section tabs (x=4..456 horizontal, y=14..94 body height).
       Layer 2: cream foam core, offset 5px inward, follows the tab
       profile so foam is visible all the way around — including in the
       crevices between the tongue tabs (this is the cut edge of a panel).
       Layer 3 (innermost): blue steel skin again, offset another 5px in,
       this is the inner face where the wordmark sits. -->

  <!-- LAYER 1 — outer blue steel skin (full panel silhouette) -->
  <path d="M 24 14
           L 24 22
           L 12 22
           L 12 40
           L 4 40
           L 4 68
           L 12 68
           L 12 86
           L 24 86
           L 24 94
           L 436 94
           L 436 86
           L 448 86
           L 448 68
           L 456 68
           L 456 40
           L 448 40
           L 448 22
           L 436 22
           L 436 14
           Z"
        fill="url(#steelSkin)"
        stroke="#06122A"
        stroke-width="1.3"
        stroke-linejoin="round"/>

  <!-- LAYER 2 — cream PIR foam core (5px inset, with foam texture).
       Tabs follow the outer silhouette but shrunk by 5px on every face,
       so a clear cream BAND is visible all the way around — this is what
       makes the brand mark read as a panel cross-section. -->
  <path d="M 29 19
           L 29 27
           L 17 27
           L 17 45
           L 9 45
           L 9 63
           L 17 63
           L 17 81
           L 29 81
           L 29 89
           L 431 89
           L 431 81
           L 443 81
           L 443 63
           L 451 63
           L 451 45
           L 443 45
           L 443 27
           L 431 27
           L 431 19
           Z"
        fill="url(#foamTexture)"
        stroke="#0A1F3D"
        stroke-width="0.6"
        stroke-linejoin="round"/>

  <!-- LAYER 3 — inner blue steel skin (where the wordmark sits).
       Another 5px inset; tabs are now small notches (the inner skin
       follows the panel profile but at the smallest scale). -->
  <path d="M 34 24
           L 34 32
           L 22 32
           L 22 50
           L 14 50
           L 14 58
           L 22 58
           L 22 76
           L 34 76
           L 34 84
           L 426 84
           L 426 76
           L 438 76
           L 438 58
           L 446 58
           L 446 50
           L 438 50
           L 438 32
           L 426 32
           L 426 24
           Z"
        fill="url(#steelSkin)"
        stroke="#F5F2EC"
        stroke-width="0.6"
        stroke-opacity="0.30"
        stroke-linejoin="round"/>

  <!-- ==== WORDMARK ==== Split into "IZHARF" + "STER" so we can place the
       compressor medallion as the "O" with equal whitespace on each side.
       Both halves are anchored at their inner edge (F's right, S's left)
       so the medallion sits centred between them at x=246, gap=18 on each
       side. The medallion itself is r=29 — slightly bigger than the cap
       height (~36px) so it visually anchors the wordmark. -->
  <text x="221" y="70" text-anchor="end" class="wm-text">IZHARF</text>
  <text x="295" y="70" text-anchor="start" class="wm-text">STER</text>

  <!-- ==== GREEN COMPRESSOR MEDALLION (the "O" of FOSTER) ====
       Sits between F and S with equal 8px whitespace gap on each side
       (F's right edge → ring left edge = ring right edge → S's left edge).
       Medallion centre x=258 — chosen so the whole composition
       (IZHARF + medallion + STER) is visually centred in the plaque body.
       Outer ring r=29 — slightly larger than caps so the compressor is
       the clear focal point. -->
  <g transform="translate(258, 54)">
    <!-- Outer cream ring -->
    <circle cx="0" cy="0" r="29" fill="#F5F2EC" stroke="#0A1F3D" stroke-width="1.1"/>
    <!-- Inner cream backdrop (so the green machine has a clean field) -->
    <circle cx="0" cy="0" r="25.5" fill="#F5F2EC"/>
    <circle cx="0" cy="0" r="25.5" fill="none" stroke="#0A1F3D" stroke-width="0.5" stroke-opacity="0.25"/>

    <!-- ==== GREEN COMPRESSOR ASSEMBLY ==== -->
    <g stroke="#0A1F3D" stroke-linejoin="round" stroke-linecap="round">

      <!-- Mounting baseplate / skid -->
      <rect x="-17" y="11" width="34" height="3" rx="0.5"
            fill="url(#greenBody)" stroke-width="0.6"/>
      <!-- Anti-vibration feet -->
      <rect x="-15" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="-1.25" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="12.5" y="14" width="2.5" height="2" fill="#0A1F3D"/>

      <!-- Crankcase body -->
      <path d="M -16 11
               L -16 3
               Q -16 1 -14 1
               L 14 1
               Q 16 1 16 3
               L 16 11 Z"
            fill="url(#greenBody)" stroke-width="0.7"/>
      <!-- Crankcase bolt-line -->
      <line x1="-14" y1="6.5" x2="14" y2="6.5" stroke-width="0.4" opacity="0.45"/>
      <!-- Bolt heads on crankcase -->
      <circle cx="-12" cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="-6"  cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="0"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="6"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="12"  cy="9" r="0.6" fill="#0A1F3D"/>

      <!-- LEFT cylinder -->
      <rect x="-12" y="-9" width="9" height="10" rx="1.2"
            fill="url(#greenHead)" stroke-width="0.7"/>
      <!-- Cooling fins -->
      <g stroke-width="0.35" opacity="0.65">
        <line x1="-12" y1="-7"  x2="-3" y2="-7"/>
        <line x1="-12" y1="-5"  x2="-3" y2="-5"/>
        <line x1="-12" y1="-3"  x2="-3" y2="-3"/>
        <line x1="-12" y1="-1"  x2="-3" y2="-1"/>
      </g>
      <!-- Top cap (head) -->
      <rect x="-13" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#greenHead)" stroke-width="0.6"/>
      <circle cx="-11" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="-3.5" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- RIGHT cylinder -->
      <rect x="3" y="-9" width="9" height="10" rx="1.2"
            fill="url(#greenHead)" stroke-width="0.7"/>
      <g stroke-width="0.35" opacity="0.65">
        <line x1="3"  y1="-7" x2="12" y2="-7"/>
        <line x1="3"  y1="-5" x2="12" y2="-5"/>
        <line x1="3"  y1="-3" x2="12" y2="-3"/>
        <line x1="3"  y1="-1" x2="12" y2="-1"/>
      </g>
      <rect x="2" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#greenHead)" stroke-width="0.6"/>
      <circle cx="4" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="11" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- ==== REFRIGERANT MANIFOLD + VALVES ==== -->
      <rect x="-14" y="-13.5" width="27" height="2" rx="0.8"
            fill="url(#greenHead)" stroke-width="0.5"/>
      <!-- Suction valve (left) -->
      <circle cx="-9" cy="-15" r="1.4" fill="url(#greenHead)" stroke-width="0.5"/>
      <line x1="-9" y1="-16.5" x2="-9" y2="-13.5" stroke-width="0.4"/>
      <!-- Discharge valve (right) -->
      <circle cx="8" cy="-15" r="1.4" fill="url(#greenHead)" stroke-width="0.5"/>
      <line x1="8" y1="-16.5" x2="8" y2="-13.5" stroke-width="0.4"/>

      <!-- Pressure gauge -->
      <circle cx="-0.5" cy="-15.5" r="1.6" fill="#F5F2EC" stroke-width="0.5"/>
      <line x1="-0.5" y1="-15.5" x2="0.5" y2="-16.3" stroke-width="0.4"/>

      <!-- Suction/discharge piping curling out either side -->
      <path d="M -14 -12.5
               Q -18 -10 -18 -6
               Q -18 -2 -16 0"
            fill="none" stroke-width="1"/>
      <path d="M 13 -12.5
               Q 17 -10 17 -6
               Q 17 -2 15 0"
            fill="none" stroke-width="1"/>
    </g>
  </g>

  <!-- ==== TAGLINE BELOW PLAQUE ==== -->
  <g transform="translate(46, 116)">
    <line x1="0" y1="-3.5" x2="14" y2="-3.5" class="tag-rule"/>
    <text x="22" y="0" class="tag-mono">Division of Izhar Engineering · Since 1959</text>
  </g>
</svg>
