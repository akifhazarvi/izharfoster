<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" role="img" aria-label="Izhar Foster — Division of Izhar Engineering">
  <defs>
    <style>
      .wm-box { fill: none; stroke: #0A1F3D; stroke-width: 3.5; }
      .wm-text { fill: #0A1F3D; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 38px; letter-spacing: 0.5px; }
      .wm-tag { fill: #2A2D33; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; font-size: 10.5px; letter-spacing: 2.4px; text-transform: uppercase; }
      .apple-body { fill: #E36A1E; }
      .apple-shine { fill: #ffffff; opacity: 0.32; }
      .apple-leaf { fill: #4FC3D9; }
      .apple-stem { fill: #0A1F3D; }
    </style>
  </defs>

  <!-- Outline box (rounded corners, thinner stroke than the original for a cleaner feel) -->
  <rect x="2" y="6" width="476" height="68" rx="3" class="wm-box"/>

  <!-- IZHAR -->
  <text x="22" y="52" class="wm-text">IZHAR</text>

  <!-- F -->
  <text x="155" y="52" class="wm-text">F</text>

  <!-- Apple replaces the first O -->
  <!-- Apple body (slightly squashed circle, suggests fruit) -->
  <g transform="translate(196, 28)">
    <path class="apple-body" d="M 14 4 C 7 4 1 10 1 18 C 1 26 5 33 9 36 C 11 37 13 37 14 37 C 15 37 17 37 19 36 C 23 33 27 26 27 18 C 27 10 21 4 14 4 Z"/>
    <!-- highlight on apple -->
    <ellipse class="apple-shine" cx="9" cy="14" rx="3" ry="5"/>
    <!-- stem -->
    <path class="apple-stem" d="M 14 5 L 14 1 L 16 0"/>
    <!-- leaf -->
    <path class="apple-leaf" d="M 16 3 C 19 0 25 1 25 5 C 22 7 17 6 16 3 Z"/>
  </g>

  <!-- STER -->
  <text x="232" y="52" class="wm-text">STER</text>

  <!-- Division tagline -->
  <text x="2" y="98" class="wm-tag">Division of Izhar Engineering · Since 1959</text>
</svg>
