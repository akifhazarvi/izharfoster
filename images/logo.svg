<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 104" role="img" aria-label="Izhar Foster — Division of Izhar Engineering">
  <defs>
    <!-- Corporate Izhar royal blue, matched to the Izhar Group of Companies mark -->
    <linearGradient id="blueBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3B82C4"/>
      <stop offset="55%"  stop-color="#2160A8"/>
      <stop offset="100%" stop-color="#174A80"/>
    </linearGradient>
    <linearGradient id="blueHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5B9BD5"/>
      <stop offset="100%" stop-color="#2160A8"/>
    </linearGradient>
    <style>
      .wordmark {
        font-family: Georgia, "Times New Roman", "Noto Serif", serif;
        font-weight: 700;
        fill: #2160A8;
        letter-spacing: 1px;
      }
      .subtag {
        font-family: "Inter", Arial, sans-serif;
        font-weight: 600;
        fill: #2160A8;
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <!-- Corporate plaque: rounded-rectangle outline in Izhar blue -->
  <rect x="3" y="5" width="464" height="62" rx="15" ry="15"
        fill="none" stroke="#2160A8" stroke-width="4"/>

  <!-- IZHAR — explicit space before FOSTER -->
  <text x="24" y="46" class="wordmark" font-size="38" dominant-baseline="middle">IZHAR</text>

  <!-- FOSTER, with the compressor medallion preserved as the letter O -->
  <text x="200" y="46" class="wordmark" font-size="38" dominant-baseline="middle">F</text>

  <!-- ==== COMPRESSOR MEDALLION (kept from current logo, recoloured to blue) ==== -->
  <!-- Original geometry preserved exactly; scaled to fit the cap-height of the wordmark. -->
  <g transform="translate(252, 36) scale(0.62)">
    <!-- Outer cream ring -->
    <circle cx="0" cy="0" r="28" fill="#F5F2EC" stroke="#174A80" stroke-width="1.1"/>
    <!-- Inner cream backdrop -->
    <circle cx="0" cy="0" r="24.5" fill="#F5F2EC"/>
    <circle cx="0" cy="0" r="24.5" fill="none" stroke="#174A80" stroke-width="0.5" stroke-opacity="0.25"/>

    <g stroke="#174A80" stroke-linejoin="round" stroke-linecap="round">
      <!-- Mounting baseplate / skid -->
      <rect x="-17" y="11" width="34" height="3" rx="0.5"
            fill="url(#blueBody)" stroke-width="0.6"/>
      <!-- Anti-vibration feet -->
      <rect x="-15" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="-1.25" y="14" width="2.5" height="2" fill="#0A1F3D"/>
      <rect x="12.5" y="14" width="2.5" height="2" fill="#0A1F3D"/>

      <!-- Crankcase body -->
      <path d="M -16 11 L -16 3 Q -16 1 -14 1 L 14 1 Q 16 1 16 3 L 16 11 Z"
            fill="url(#blueBody)" stroke-width="0.7"/>
      <!-- Crankcase bolt-line -->
      <line x1="-14" y1="6.5" x2="14" y2="6.5" stroke-width="0.4" opacity="0.45"/>
      <!-- Bolt heads on crankcase -->
      <circle cx="-12" cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="-6"  cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="0"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="6"   cy="9" r="0.6" fill="#0A1F3D"/>
      <circle cx="12"  cy="9" r="0.6" fill="#0A1F3D"/>

      <!-- LEFT cylinder -->
      <rect x="-12" y="-9" width="9" height="10" rx="1.2"
            fill="url(#blueHead)" stroke-width="0.7"/>
      <!-- Cooling fins -->
      <g stroke-width="0.35" opacity="0.65">
        <line x1="-12" y1="-7"  x2="-3" y2="-7"/>
        <line x1="-12" y1="-5"  x2="-3" y2="-5"/>
        <line x1="-12" y1="-3"  x2="-3" y2="-3"/>
        <line x1="-12" y1="-1"  x2="-3" y2="-1"/>
      </g>
      <!-- Top cap (head) -->
      <rect x="-13" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#blueHead)" stroke-width="0.6"/>
      <circle cx="-11" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="-3.5" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- RIGHT cylinder -->
      <rect x="3" y="-9" width="9" height="10" rx="1.2"
            fill="url(#blueHead)" stroke-width="0.7"/>
      <g stroke-width="0.35" opacity="0.65">
        <line x1="3"  y1="-7" x2="12" y2="-7"/>
        <line x1="3"  y1="-5" x2="12" y2="-5"/>
        <line x1="3"  y1="-3" x2="12" y2="-3"/>
        <line x1="3"  y1="-1" x2="12" y2="-1"/>
      </g>
      <rect x="2" y="-11" width="11" height="2.5" rx="0.6"
            fill="url(#blueHead)" stroke-width="0.6"/>
      <circle cx="4" cy="-9.7" r="0.55" fill="#0A1F3D"/>
      <circle cx="11" cy="-9.7" r="0.55" fill="#0A1F3D"/>

      <!-- Refrigerant manifold -->
      <rect x="-14" y="-13.5" width="27" height="2" rx="0.8"
            fill="url(#blueHead)" stroke-width="0.5"/>
      <!-- Suction valve (left) -->
      <circle cx="-9" cy="-15" r="1.4" fill="url(#blueHead)" stroke-width="0.5"/>
      <line x1="-9" y1="-16.5" x2="-9" y2="-13.5" stroke-width="0.4"/>
      <!-- Discharge valve (right) -->
      <circle cx="8" cy="-15" r="1.4" fill="url(#blueHead)" stroke-width="0.5"/>
      <line x1="8" y1="-16.5" x2="8" y2="-13.5" stroke-width="0.4"/>

      <!-- Pressure gauge -->
      <circle cx="-0.5" cy="-15.5" r="1.6" fill="#F5F2EC" stroke-width="0.5"/>
      <line x1="-0.5" y1="-15.5" x2="0.5" y2="-16.3" stroke-width="0.4"/>

      <!-- Suction/discharge piping curling out either side -->
      <path d="M -14 -12.5 Q -18 -10 -18 -6 Q -18 -2 -16 0"
            fill="none" stroke-width="1"/>
      <path d="M 13 -12.5 Q 17 -10 17 -6 Q 17 -2 15 0"
            fill="none" stroke-width="1"/>
    </g>
  </g>

  <!-- STER -->
  <text x="274" y="46" class="wordmark" font-size="38" dominant-baseline="middle">STER</text>

  <!-- Sub-tag, mirroring the corporate treatment -->
  <text x="26" y="84" class="subtag" font-size="12">DIVISION OF IZHAR ENGINEERING</text>
</svg>
