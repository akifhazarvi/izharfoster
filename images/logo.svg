<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 100" role="img" aria-label="Izhar Foster — Cold-Chain Division of Izhar Group">
  <defs>
    <!-- Corporate Izhar royal blue, sampled from the Izhar Group of Companies logo -->
    <style>
      .izhar-blue { fill: #2160A8; }
      .izhar-stroke { fill: none; stroke: #2160A8; }
      .wordmark {
        font-family: Georgia, "Times New Roman", "Noto Serif", serif;
        font-weight: 700;
        fill: #2160A8;
        letter-spacing: 1px;
      }
      .subtag {
        font-family: "Inter", Arial, sans-serif;
        font-weight: 600;
        fill: #2160A8;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- Rounded-rectangle plaque outline, matching the corporate Izhar mark -->
  <rect x="3" y="5" width="424" height="60" rx="15" ry="15"
        class="izhar-stroke" stroke-width="4"/>

  <!-- IZHAR — explicit space follows before FOSTER -->
  <text x="22" y="44" class="wordmark" font-size="37" dominant-baseline="middle">IZHAR</text>

  <!-- FOSTER, with the compressor medallion as the letter O -->
  <text x="186" y="44" class="wordmark" font-size="37" dominant-baseline="middle">F</text>

  <g transform="translate(231,33)">
    <!-- medallion ring as the "O" -->
    <circle cx="0" cy="0" r="17" fill="#F5F2EC" class="izhar-stroke" stroke-width="2.4"/>
    <!-- simplified two-cylinder compressor, corporate blue -->
    <g class="izhar-blue" transform="translate(0,1) scale(0.55)">
      <rect x="-16" y="3" width="32" height="11" rx="2"/>
      <rect x="-19" y="14" width="38" height="4" rx="1"/>
      <rect x="-13" y="-12" width="10" height="15" rx="2"/>
      <rect x="3"   y="-12" width="10" height="15" rx="2"/>
      <rect x="-15" y="-15" width="30" height="4" rx="1"/>
    </g>
  </g>

  <text x="251" y="44" class="wordmark" font-size="37" dominant-baseline="middle">STER</text>

  <!-- Division sub-tag, mirroring "GROUP OF COMPANIES" treatment -->
  <text x="24" y="82" class="subtag" font-size="12">COLD-CHAIN DIVISION</text>
</svg>
