<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" role="img" aria-label="Izhar Foster — Cold Chain Since 1959">
  <defs>
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0A1F3D"/>
      <stop offset="50%"  stop-color="#4FC3D9"/>
      <stop offset="100%" stop-color="#E36A1E"/>
    </linearGradient>
    <style>
      .name { fill: #0A1F3D; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 42px; letter-spacing: -1.2px; }
      .name-light { fill: #F5F2EC; }
      .tag  { fill: #2A2D33; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; font-size: 11px; letter-spacing: 3.4px; text-transform: uppercase; }
      .tag-light { fill: rgba(245,242,236,0.65); }
      .accent { fill: #E36A1E; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 600; font-size: 11px; letter-spacing: 1.6px; }
    </style>
  </defs>

  <!-- Brand mark: vertical temperature spectrum bar -->
  <rect x="0" y="14" width="6" height="68" rx="3" fill="url(#spec)"/>
  <!-- tick marks beside the bar -->
  <g stroke="#0A1F3D" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <line x1="10" y1="20" x2="14" y2="20"/>
    <line x1="10" y1="38" x2="14" y2="38"/>
    <line x1="10" y1="56" x2="14" y2="56"/>
    <line x1="10" y1="74" x2="14" y2="74"/>
  </g>

  <!-- Wordmark -->
  <text x="32" y="56" class="name">IZHAR FOSTER</text>

  <!-- Tagline lockup -->
  <g transform="translate(32, 80)">
    <text x="0" y="0" class="tag">Cold Chain</text>
    <line x1="92" y1="-4" x2="100" y2="-4" stroke="#E36A1E" stroke-width="1.5"/>
    <text x="108" y="0" class="accent">SINCE 1959</text>
  </g>
</svg>
