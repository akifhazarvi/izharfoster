<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 110" role="img" aria-label="Izhar Foster — Cold-Chain Division of Izhar Engineering">
  <defs>
    <!-- PIR foam core: heritage ember preserved, now meaning the actual insulating foam -->
    <linearGradient id="pirCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#F08A3E"/>
      <stop offset="100%" stop-color="#C75615"/>
    </linearGradient>
    <!-- Steel skin: ink (warm side) -->
    <linearGradient id="skinWarm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#152D52"/>
      <stop offset="100%" stop-color="#0A1F3D"/>
    </linearGradient>
    <!-- Steel skin: cyan (cold side) -->
    <linearGradient id="skinCold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7FD4E5"/>
      <stop offset="100%" stop-color="#3BAFCC"/>
    </linearGradient>
    <linearGradient id="frameInk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0A1F3D"/>
      <stop offset="100%" stop-color="#152D52"/>
    </linearGradient>
    <style>
      .wm-text { fill: #0A1F3D; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 38px; letter-spacing: 0.5px; }
      .tag-rule { stroke: #E36A1E; stroke-width: 1.5; stroke-linecap: round; }
      .tag-mono { fill: #2A2D33; font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; font-size: 10px; letter-spacing: 2.6px; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Heritage frame -->
  <rect x="3" y="6" width="534" height="72" rx="10" fill="none" stroke="url(#frameInk)" stroke-width="2"/>
  <rect x="7" y="10" width="526" height="64" rx="6" fill="none" stroke="#0A1F3D" stroke-width="0.6" opacity="0.35"/>

  <text x="26" y="55" class="wm-text">IZHAR</text>
  <text x="170" y="55" class="wm-text">F</text>

  <!-- THE MARK: PIR sandwich panel cross-section, sized to cap-height (~28px tall, ~32px wide).
       This is a literal slice through the product:
         top band     → cold-side steel skin (cyan)
         middle band  → PIR foam core (heritage ember)
         bottom band  → warm-side steel skin (ink)
       Tongue on the right edge + groove on the left edge = the modular interlock
       that makes panels actually panels. Two faint dimension ticks above and below
       complete the engineering-drawing read. -->
  <g transform="translate(206, 27)">
    <!-- Bounding clip so the tongue doesn't escape its lane -->
    <defs>
      <clipPath id="panelClip">
        <path d="M 0 4
                 L 32 4
                 L 32 10
                 L 35 13
                 L 35 17
                 L 32 20
                 L 32 26
                 L 0 26
                 L 0 20
                 L -3 17
                 L -3 13
                 L 0 10
                 Z"/>
      </clipPath>
    </defs>

    <!-- Single panel silhouette (the outline) -->
    <path d="M 0 4
             L 32 4
             L 32 10
             L 35 13
             L 35 17
             L 32 20
             L 32 26
             L 0 26
             L 0 20
             L -3 17
             L -3 13
             L 0 10
             Z"
          fill="url(#pirCore)"
          stroke="#0A1F3D"
          stroke-width="0.6"
          stroke-linejoin="round"/>

    <!-- Cold-side skin (top band, cyan) — clipped to panel silhouette so it follows
         the tongue/groove profile precisely -->
    <g clip-path="url(#panelClip)">
      <rect x="-4" y="4" width="40" height="6.5" fill="url(#skinCold)"/>
      <!-- Warm-side skin (bottom band, ink) -->
      <rect x="-4" y="19.5" width="40" height="6.5" fill="url(#skinWarm)"/>
      <!-- Two horizontal seam lines marking the skin/core interfaces -->
      <line x1="-4" y1="10.5" x2="36" y2="10.5" stroke="#0A1F3D" stroke-width="0.5" opacity="0.6"/>
      <line x1="-4" y1="19.5" x2="36" y2="19.5" stroke="#0A1F3D" stroke-width="0.5" opacity="0.6"/>
    </g>

    <!-- Dimension ticks (engineering-drawing cue) above and below the panel -->
    <g stroke="#0A1F3D" stroke-width="0.7" stroke-linecap="round" opacity="0.55">
      <line x1="0" y1="0" x2="0" y2="2"/>
      <line x1="32" y1="0" x2="32" y2="2"/>
      <line x1="0" y1="28" x2="0" y2="30"/>
      <line x1="32" y1="28" x2="32" y2="30"/>
    </g>
  </g>

  <text x="248" y="55" class="wm-text">STER</text>

  <g transform="translate(26, 100)">
    <line x1="0" y1="-3.5" x2="14" y2="-3.5" class="tag-rule"/>
    <text x="22" y="0" class="tag-mono">Division of Izhar Engineering</text>
  </g>
</svg>
