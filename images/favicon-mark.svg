<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Izhar Foster">
  <!-- Solid blue rounded square — recognisable at 16px -->
  <rect width="32" height="32" rx="6" fill="#0A1F3D"/>

  <!-- Simplified compressor mark: two cylinders + crankcase, solid green silhouette -->
  <!-- Centred at (16, 17). Total mark: ~22w × 18h. -->
  <g fill="#3FA85F">
    <!-- Crankcase (bottom block) -->
    <rect x="5" y="17" width="22" height="7" rx="1.2"/>
    <!-- Baseplate -->
    <rect x="3.5" y="24" width="25" height="2.4" rx="0.6"/>
    <!-- Left cylinder -->
    <rect x="7" y="8" width="7" height="10" rx="1.2"/>
    <!-- Right cylinder -->
    <rect x="18" y="8" width="7" height="10" rx="1.2"/>
    <!-- Manifold across cylinder tops -->
    <rect x="6" y="6" width="20" height="2.5" rx="0.6"/>
  </g>
</svg>
